<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loading...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #f5f1eb;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ─── iframe 全屏加载区 ─── */
        #content-frame {
            width: 100%;
            height: 100vh;
            border: none;
        }

        /* ─── 加载提示 ─── */
        #loading {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f5f1eb;
            z-index: 1;
            color: #999;
            font-size: 15px;
        }
        #loading .spinner {
            display: inline-block;
            width: 28px; height: 28px;
            border: 3px solid #e0d8d0;
            border-top-color: #888;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-bottom: 12px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loading .err { color: #c44; font-weight: 600; }

        /* ─── 右下悬浮按钮组 ─── */
        .float-group {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 10px;
            z-index: 99;
        }

        .float-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: #2c2c2c;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            font-size: 22px;
            box-shadow: 0 4px 16px rgba(0,0,0,0.18);
            transition: transform 0.2s, box-shadow 0.2s, background 0.2s;
            position: relative;
        }
        .float-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 24px rgba(0,0,0,0.25);
            background: #111;
        }

        .float-btn .tooltip {
            position: absolute;
            right: 62px;
            top: 50%;
            transform: translateY(-50%);
            background: #2c2c2c;
            color: #fff;
            font-size: 13px;
            padding: 6px 14px;
            border-radius: 8px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        .float-btn:hover .tooltip {
            opacity: 1;
        }

        .float-btn.code-icon svg {
            width: 22px;
            height: 22px;
        }

        @media (max-width: 600px) {
            .float-group {
                bottom: 20px;
                right: 20px;
                gap: 8px;
            }
            .float-btn {
                width: 44px;
                height: 44px;
                font-size: 18px;
            }
            .float-btn .tooltip {
                font-size: 12px;
                padding: 4px 10px;
                right: 54px;
            }
        }
    </style>
</head>
<body>

<!-- ═══ 加载提示 ─── -->
<div id="loading">
    <div class="spinner"></div>
    <div>正在加载…</div>
</div>

<!-- ═══ 内容 iframe（全屏显示同名 HTML） ─── -->
<iframe id="content-frame" src="" sandbox="allow-scripts allow-same-origin" loading="lazy"></iframe>

<!-- ═══ 右下悬浮按钮组 ─── -->
<div class="float-group">
    <!-- GitHub 仓库 -->
    <a id="github-btn" href="#" class="float-btn code-icon" target="_blank" rel="noopener">
        <svg viewBox="0 0 16 16" fill="currentColor">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
        </svg>
        <span class="tooltip" id="github-tooltip">GitHub 仓库</span>
    </a>

    <!-- 返回首页 -->
    <a id="home-btn" href="https://nomean2026.github.io/" class="float-btn" target="_blank" rel="noopener">
        🏠
        <span class="tooltip" id="home-tooltip">返回 nomean2026.github.io</span>
    </a>
</div>

<script>
(function () {

    // ─── 1. 从 URL 解析仓库名 ───
    const path = window.location.pathname.replace(/\/+$/, '');
    const repoName = path.split('/').filter(Boolean).pop() || '';

    // ─── 2. 推断 GitHub 用户和仓库地址 ───
    const hostParts = window.location.hostname.split('.');
    const ghUser = hostParts[0];
    const repoUrl = repoName ? `https://github.com/${ghUser}/${repoName}` : `https://github.com/${ghUser}`;

    // ─── 3. 更新 GitHub 按钮 ───
    const ghBtn = document.getElementById('github-btn');
    const ghTooltip = document.getElementById('github-tooltip');
    ghBtn.href = repoUrl;
    ghTooltip.textContent = repoName ? `${ghUser}/${repoName}` : ghUser;

    // ─── 4. 更新首页按钮 tooltip ───
    document.getElementById('home-tooltip').textContent = `返回 ${ghUser}.github.io`;

    // ─── 5. 加载与仓库同名的 HTML ───
    const loadingEl = document.getElementById('loading');
    const frame = document.getElementById('content-frame');

    if (!repoName) {
        loadingEl.innerHTML = '<div class="err">⚠️ 无法识别仓库名称</div><div style="margin-top:8px;color:#999;font-size:13px;">请在 GitHub Pages 仓库路径下访问此页面。</div>';
        return;
    }

    const targetUrl = `./${repoName}.html`;

    fetch(targetUrl, { method: 'HEAD' })
        .then(res => {
            if (!res.ok) throw new Error(`HTTP ${res.status}`);
            loadingEl.style.display = 'none';
            frame.src = targetUrl;
        })
        .catch(() => {
            loadingEl.innerHTML = `
                <div class="err">📄 ${repoName}.html 未找到</div>
                <div style="margin-top:8px;color:#999;font-size:13px;">
                    请确保仓库中存在与仓库同名的 HTML 文件作为首页内容。
                </div>
                <div style="margin-top:6px;color:#bbb;font-size:12px;">
                    当前仓库: ${repoUrl}
                </div>
            `;
        });

    frame.addEventListener('load', () => {
        loadingEl.style.display = 'none';
    });

    console.log(`%c📂 ${repoName} · 导航已就绪`, 'font-size:16px;font-weight:bold;color:#5a4a3a;');
    console.log(`%c  GitHub: ${repoUrl}`, 'color:#888;');

})();
</script>

</body>
</html>
